<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin – Programação Individual</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBzzQg4fMWQm82aOu2xM2huVPvHeyitFxQ",
    authDomain: "controle-remoto-da345.firebaseapp.com",
    databaseURL: "https://controle-remoto-da345-default-rtdb.firebaseio.com",
    projectId: "controle-remoto-da345",
    storageBucket: "controle-remoto-da345.firebasestorage.app",
    messagingSenderId: "246457543992",
    appId: "1:246457543992:web:41bf1bd64a4788fb2625cd",
    measurementId: "G-CFHSFG82SX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  let blocosRef = null; // Será definida após o login

  /* ============================
        MONITOR DE LOGIN (NOVO)
     ============================ */
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // DEFINE A PASTA DO CLIENTE LOGADO
      blocosRef = ref(db, `usuarios/${user.uid}/player_m3u`);
      
      // Inicia a escuta dos dados
      onValue(blocosRef, snap => atualizarLista(snap.val()));
      console.log("Admin conectado à pasta: " + user.uid);
    } else {
      alert("Acesso negado. Faça login no Player primeiro.");
      window.location.href = "cara.html"; 
    }
  });

  /* ============================
        LISTAR BLOCOS
     ============================ */
  function atualizarLista(dados) {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    Object.keys(dados || {}).forEach(i => {
      const b = dados[i];
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h3>Bloco ${i}</h3>
        <label>Link M3U:</label>
        <input id="m3u-${i}" value="${b.m3u || ''}">
        <label>Link YouTube:</label>
        <input id="yt-${i}" value="${b.yt || ''}">
        <label>Dia da semana:</label>
        <select id="dia-${i}">
          <option value="">-- selecione --</option>
          <option ${b.dia==="segunda"?"selected":""} value="segunda">Segunda</option>
          <option ${b.dia==="terca"?"selected":""} value="terca">Terça</option>
          <option ${b.dia==="quarta"?"selected":""} value="quarta">Quarta</option>
          <option ${b.dia==="quinta"?"selected":""} value="quinta">Quinta</option>
          <option ${b.dia==="sexta"?"selected":""} value="sexta">Sexta</option>
          <option ${b.dia==="sabado"?"selected":""} value="sabado">Sábado</option>
          <option ${b.dia==="domingo"?"selected":""} value="domingo">Domingo</option>
        </select>
        <label>Hora início:</label>
        <input id="inicio-${i}" type="time" value="${b.inicio || ''}">
        <label>Hora fim:</label>
        <input id="fim-${i}" type="time" value="${b.fim || ''}">
        <button class="saveBtn" onclick="salvar(${i})">Salvar</button>
        <button class="deleteBtn" onclick="apagar(${i})">Apagar</button>
      `;
      lista.appendChild(card);
    });
  }

  window.salvar = function(i) {
    if(!auth.currentUser) return;
    const caminho = ref(db, `usuarios/${auth.currentUser.uid}/player_m3u/${i}`);
    set(caminho, {
      m3u: document.getElementById("m3u-" + i).value,
      yt: document.getElementById("yt-" + i).value,
      dia: document.getElementById("dia-" + i).value,
      inicio: document.getElementById("inicio-" + i).value,
      fim: document.getElementById("fim-" + i).value,
      timestamp: Date.now()
    });
    alert("✔ Salvo na sua área individual!");
  };

  window.apagar = function(i) {
    if (!confirm("Apagar bloco?")) return;
    remove(ref(db, `usuarios/${auth.currentUser.uid}/player_m3u/${i}`));
  };

  window.adicionarBloco = function() {
    onValue(blocosRef, snap => {
      const dados = snap.val() || {};
      const novoID = Object.keys(dados).length;
      set(ref(db, `usuarios/${auth.currentUser.uid}/player_m3u/${novoID}`), {
        m3u: "", yt: "", dia: "", inicio: "", fim: "", timestamp: Date.now()
      });
    }, { onlyOnce: true });
  };
</script>

<style>
/* SEU CSS ORIGINAL */
body { background:#111; color:#fff; font-family:Arial; padding: 20px; }
#topBar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
#addBtn { background:#28a745; padding:10px 18px; border:none; color:white; border-radius:8px; cursor:pointer; }
.card { background:#1b1b1b; padding:15px; border-radius:10px; margin-bottom:15px; border:1px solid #333; width:300px; }
input, select { width:100%; margin-bottom:8px; padding:6px; background:#222; border:1px solid #555; color:white; }
button { width:100%; padding:8px; border:none; color:white; border-radius:6px; margin-top:6px; cursor:pointer; }
.saveBtn { background:#007bff; }
.deleteBtn { background:#dc3545; }
</style>
</head>
<body>
<div id="topBar">
  <h1>Admin Individual</h1>
  <button id="addBtn" onclick="adicionarBloco()">+ Novo Bloco Individual</button>
</div>
<div id="lista">Carregando seus blocos…</div>
</body>
</html>
