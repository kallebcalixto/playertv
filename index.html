<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Player Programado — KBS TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { 
    color-scheme: dark; 
    --primary-color: #2e7d32; 
    --error-color: #ff4d4d;
    --gold: #ffd700;
  }
  body {
    background:#111;
    color:#eee;
    font-family: 'Segoe UI', Arial, sans-serif;
    margin:0;
    overflow-y: scroll;
    min-height: 101vh;
  }

  /* --- TELA DE PAGAMENTO/BLOQUEIO ROBUSTA E CHAMATIVA --- */
  #tela-pagamento {
    position: fixed; 
    top: 0; left: 0; 
    width: 100%; height: 100%; 
    background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
    display: none; 
    justify-content: center; 
    align-items: center; 
    z-index: 100000;
    backdrop-filter: blur(10px);
  }

  .painel-premium {
    background: #161616;
    padding: 40px;
    border-radius: 24px;
    border: 1px solid #333;
    width: 100%;
    max-width: 450px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    position: relative;
    overflow: hidden;
  }

  .painel-premium::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 4px;
    background: linear-gradient(90deg, transparent, var(--error-color), transparent);
  }

  .status-badge {
    background: var(--error-color);
    color: white;
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 20px;
  }

  .painel-premium h2 {
    font-size: 32px;
    margin: 10px 0;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
  }

  .painel-premium p {
    color: #aaa;
    margin-bottom: 30px;
    font-size: 15px;
  }

  /* BOTOES DE PLANO ROBUSTOS */
  .btn-plano-premium {
    width: 100%;
    padding: 20px;
    margin: 12px 0;
    background: linear-gradient(145deg, #1e1e1e, #141414);
    border: 1px solid #333;
    color: #fff;
    border-radius: 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .btn-plano-premium:hover {
    border-color: var(--primary-color);
    transform: translateY(-2px);
    background: #1f1f1f;
    box-shadow: 0 5px 15px rgba(46, 125, 50, 0.2);
  }

  .btn-plano-premium .nome {
    font-weight: bold;
    font-size: 16px;
    text-transform: uppercase;
  }

  .btn-plano-premium .preco {
    color: var(--primary-color);
    font-weight: 900;
    font-size: 18px;
  }

  .btn-plano-premium.destaque {
    border-color: var(--gold);
  }
  .btn-plano-premium.destaque .preco {
    color: var(--gold);
  }

  #qrcode-container {
    margin-top: 25px;
    background: #000;
    padding: 20px;
    border-radius: 16px;
    border: 1px solid #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* --- ESTILOS ORIGINAIS (MANTIDOS) --- */
  #tela-login {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #111; display: flex; justify-content: center; align-items: center; z-index: 99999;
  }
  .card-login {
    background: #1b1b1b; padding: 30px; border-radius: 12px;
    border: 1px solid #333; width: 320px; text-align: center;
  }
  .card-login h2 { margin-bottom: 20px; color: #2e7d32; }
  .card-login input {
    width: 100%; padding: 12px; margin: 10px 0; background: #222;
    border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box;
  }
  .card-login button {
    width: 100%; padding: 12px; background: #2e7d32; color: white;
    border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px;
  }
  .card-login button:hover { background: #3e8d42; }

  header { padding:16px 20px; background:#1b1b1b; border-top:1px solid #2a2a2a; }
  header h1 { margin:0 0 6px 0; font-size:18px; }
  #grade { white-space:pre-line; font-size:13px; color:#ddd; max-height:220px; overflow-y:auto; }
  .wrap { max-width:1200px; margin:0 auto; padding:20px; }
  .top { display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap; justify-content:center; }
  #player, #ytplayer { width:500px; height:280px; background:#000; border:1px solid #333; border-radius:8px; }
  #player { object-fit: contain; display:block; }
  #ytplayer { display:none; }
  .controls { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  button { padding:8px 12px; border:none; border-radius:8px; cursor:pointer; background:#2f2f2f; color:#fff; }
  button:hover { background:#454545; }
  .btn-pri { background:#2e7d32; } .btn-pri:hover{ background:#3e8d42; }
  .btn-sec { background:#1976d2; } .btn-sec:hover{ background:#2a82d8; }
  .btn-admin { background:#6200ee; font-weight: bold; } .btn-admin:hover { background:#7c4dff; }
  .grid { display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; max-height:320px; overflow-y:auto; }
  .bloco { position:relative; flex:0 0 260px; border:1px solid #2b2b2b; background:#171717; border-radius:10px; padding:12px; }
  .bloco h3 { margin:0 0 10px 0; font-size:15px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .row input[type="time"] { width:130px; }
  .hint { font-size:12px; color:#aaa; }
  .badge { display:inline-block; padding:2px 8px; border-radius:999px; background:#2a2a2a; font-size:12px; margin-left:6px; }
  .running::before {
    content:"Em execução"; position:absolute; top:0; left:0; right:0;
    background:#2e7d32; color:#fff; font-size:12px; text-align:center;
    padding:2px 0; border-radius:10px 10px 0 0;
  }
  .mini-btn { padding:4px 6px; margin:2px; border:none; border-radius:6px; cursor:pointer; background:#444; color:#fff; font-size:12px; }
  .mini-btn:hover { background:#666; }

  /* --- BANNER ARRASTÁVEL --- */
  #letreiro-kbs-auto {
    position: absolute; top: 20px; left: 20px; z-index: 999;
    background: transparent; color: #ffd700; border-left: 5px solid #ffd700;
    padding: 10px 20px; font-weight: bold; font-size: 14px;
    display: none; align-items: center; gap: 10px; border-radius: 0 8px 8px 0;
    text-shadow: 2px 2px 4px #000; 
    cursor: move; /* MOUSE VIRA CRUZ DE MOVIMENTO */
    user-select: none;
  }
  #letreiro-logo-img { height: 25px; width: auto; display: none; pointer-events: none; }
  #letreiro-texto-arquivo { pointer-events: none; }
</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBzzQg4fMWQm82aOu2xM2huVPvHeyitFxQ",
    authDomain: "controle-remoto-da345.firebaseapp.com",
    databaseURL: "https://controle-remoto-da345-default-rtdb.firebaseio.com",
    projectId: "controle-remoto-da345",
    storageBucket: "controle-remoto-da345.firebasestorage.app",
    messagingSenderId: "246457543992",
    appId: "1:246457543992:web:41bf1bd64a4788fb2625cd",
    measurementId: "G-CFHSFG82SX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  window.fazerLogin = () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Erro: " + err.message));
  };

  window.fazerCadastro = () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    if(!email || !pass) return alert("Preencha email e senha");
    createUserWithEmailAndPassword(auth, email, pass)
      .then((userCredential) => {
        const user = userCredential.user;
        const novaReferencia = ref(db, `usuarios/${user.uid}/player_m3u/0`);
        set(novaReferencia, {
          dia: "segunda", inicio: "12:00", fim: "13:00",
          m3u: "https://srv4.zcast.com.br/samircalixto/samircalixto/playlist.m3u8",
          yt: "", timestamp: Date.now()
        }).then(() => alert("Cliente cadastrado!"));
      })
      .catch(err => alert("Erro ao cadastrar: " + err.message));
  };

  window.fazerLogout = () => {
    signOut(auth).then(() => { location.reload(); }).catch(err => alert("Erro ao sair: " + err.message));
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('tela-login').style.display = 'none';
      onValue(ref(db, `usuarios/${user.uid}/config`), snap => {
        const config = snap.val() || { expiracao: 0 };
        const agora = Date.now();
        if (config.expiracao < agora) {
          document.getElementById('tela-pagamento').style.display = 'flex';
          document.getElementById('conteudo-player').style.display = 'none';
        } else {
          document.getElementById('tela-pagamento').style.display = 'none';
          document.getElementById('conteudo-player').style.display = 'block';
          const blocosRef = ref(db, `usuarios/${user.uid}/player_m3u`);
          iniciarLeituraFirebase(blocosRef);
        }
      });
    } else {
      document.getElementById('tela-login').style.display = 'flex';
      document.getElementById('conteudo-player').style.display = 'none';
    }
  });

  window.gerarPix = async (valorPlano) => {
    const container = document.getElementById('qrcode-container');
    container.innerHTML = "<p>Gerando código PIX seguro...</p>";
    try {
      const res = await fetch("https://kbs-backend-k3d0.onrender.com/gerar-pix", {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: auth.currentUser.email, uid: auth.currentUser.uid, valor: valorPlano })
      });
      const data = await res.json();
      if(data.qr_code_base64) {
        container.innerHTML = `
          <img src="data:image/png;base64,${data.qr_code_base64}" style="width:180px; background:white; padding:10px; border-radius:12px; box-shadow: 0 0 20px rgba(255,255,255,0.1);">
          <div style="margin-top:10px; font-size:11px; color:#2e7d32; font-weight:bold;">CÓDIGO COPIA E COLA:</div>
          <div style="font-size:10px; color:#888; word-break:break-all; background:#111; padding:8px; border:1px solid #333; width:100%; box-sizing:border-box;">${data.qr_code}</div>
          <button onclick="navigator.clipboard.writeText('${data.qr_code}').then(()=>alert('Copiado!'))" style="margin-top:5px; background:#333; font-size:11px;">Copiar Código</button>
        `;
      }
    } catch (e) { alert("Erro ao conectar com servidor."); container.innerHTML = ""; }
  };

  window._firebase_db = db;
  window._firebase_ref = ref;
  window._firebase_set = set;
  window._firebase_onValue = onValue;

  window.iniciarLeituraFirebase = function(referenciaDinamica) {
      window._firebase_onValue(referenciaDinamica, snap => {
          const dadosFirebase = snap.val() || {};
          let novosBlocos = [];
          const blocosAtuaisLocais = blocos.filter(b => b.tipo !== 'youtube');
          novosBlocos.push(...blocosAtuaisLocais);

          Object.keys(dadosFirebase).forEach(i => {
              const d = dadosFirebase[i];
              novosBlocos.push({
                  tipo: 'youtube', arquivos: [], progresso: [],
                  tempo: 0, sessaoRestante: 0, pauseRestante: 0,
                  arquivoAtual: 0, limitePorCiclo: 0,
                  ytlink: d.yt || '', m3ulink: d.m3u || '', 
                  diaSemana: d.dia || '', horaInicio: d.inicio || '', horaFim: d.fim || '',
                  removido: false, _agendadoRodando: false, _firebaseIndex: parseInt(i)
              });
          });

          blocos = novosBlocos;
          blocosEl.innerHTML = '';
          blocos.forEach((b, i) => renderizarBloco(i, b));
          atualizarGrade();
          if (idxBloco >= blocos.length) idxBloco = 0;
      });
  };
</script>
</head>

<body>
  <div id="tela-pagamento">
    <div class="painel-premium">
      <div class="status-badge">Sinal Interrompido</div>
      <h2>Acesso Expirado</h2>
      <p>Sua licença KBS TV chegou ao fim. Selecione um plano abaixo para liberar o player agora mesmo:</p>
      
      <button class="btn-plano-premium" onclick="gerarPix(29.90)">
        <span class="nome">Plano Mensal</span>
        <span class="preco">R$ 00,10</span>
      </button>

      <button class="btn-plano-premium destaque" onclick="gerarPix(230.90)">
        <span class="nome">Plano Semestral 🌟</span>
        <span class="preco">R$ 230,90</span>
      </button>

      <button class="btn-plano-premium" onclick="gerarPix(349.90)">
        <span class="nome">Plano Anual</span>
        <span class="preco">R$ 349,90</span>
      </button>

      <div id="qrcode-container"></div>
      
      <button onclick="fazerLogout()" style="background:none; border:none; color:#555; text-decoration:underline; cursor:pointer; margin-top:20px; font-size:13px;">Alternar conta de usuário</button>
    </div>
  </div>

  <div id="tela-login">
    <div class="card-login">
      <h2>KBS TV - ACESSO</h2>
      <input type="email" id="email" placeholder="E-mail">
      <input type="password" id="pass" placeholder="Senha">
      <button onclick="fazerLogin()">ENTRAR NO PLAYER</button>
      <button onclick="fazerCadastro()" style="background:#1976d2; margin-top: 5px;">CADASTRAR NOVO CLIENTE</button>
    </div>
  </div>

  <div id="conteudo-player" style="display:none;">
    <div class="wrap">
      <div style="display: flex; justify-content: flex-end; margin-bottom: 15px; gap: 10px;">
          <button class="btn-admin" onclick="window.open('admin.html', '_blank')">⚙️ ABRIR ADMIN</button>
          <button onclick="fazerLogout()" style="background:#b71c1c; font-weight: bold;">🚪 SAIR</button>
      </div>

      <div class="top">
        <div style="position: relative;">
          <div id="letreiro-kbs-auto" onmousedown="startDrag(event)">
            <img id="letreiro-logo-img" src="">
            <span id="letreiro-texto-arquivo"></span>
          </div>

          <video id="player" controls playsinline></video>
          <iframe id="ytplayer" allow="autoplay; encrypted-media" frameborder="0"></iframe>
          <div class="controls">
            <button class="btn-pri" onclick="iniciar()">▶ Iniciar</button>
            <button onclick="pausar()">⏸ Pausar</button>
            <button onclick="retomar()">⏵ Retomar</button>
            <button onclick="blocoAnterior()">⏮ Bloco anterior</button>
            <button onclick="proximoBloco()">⏭ Próximo bloco</button>
          </div>

          <div class="player-resize-controls" style="margin-top:10px; display:flex; gap:8px; align-items:center;">
            <label>Largura:</label>
            <input type="number" id="playerWidth" value="500" style="width:70px;">
            <label>Altura:</label>
            <input type="number" id="playerHeight" value="280" style="width:70px;">
            <button onclick="resizePlayer()">Redimensionar</button>
          </div>
        </div>

        <div>
          <button class="btn-sec" onclick="adicionarBloco('timer')">+ Bloco (Tempo Fixo)</button>
          <button class="btn-sec" onclick="adicionarBloco('movie')">+ Bloco (Filmes)</button>
          <button class="btn-sec" onclick="adicionarBloco('pause')">+ Bloco (Pausa)</button>
          <button class="btn-sec" onclick="salvarProgramacao()">💾 Salvar</button>
          <button class="btn-sec" onclick="document.getElementById('fileInput').click()">📂 Carregar</button>
          <input type="file" id="fileInput" style="display:none" accept="application/json" onchange="carregarProgramacao(this)">

          <div style="margin-top:15px; background:#222; padding:10px; border-radius:8px; border:1px solid #333;">
            <label style="font-size:11px; display:block; margin-bottom:5px;">LINK DA LOGO (BANNER):</label>
            <input type="text" id="logoUrl" placeholder="Link da imagem .png" style="width:100%; background:#000; border:1px solid #444; color:#fff; font-size:12px; padding:5px;">
          </div>
        </div>
      </div>
      <div id="blocos" class="grid"></div>
    </div>

    <header>
      <h1>📺 Grade de Programação</h1>
      <div id="grade">Carregando programação do administrador...</div>
    </header>
  </div>

<script>
const video = document.getElementById('player');
const ytplayer = document.getElementById('ytplayer');
const gradeEl = document.getElementById('grade');
const blocosEl = document.getElementById('blocos');

let blocos = [];
let idxBloco = 0;
let timeupdateHandler = null;
let pauseTimer = null;
let blocoAnteriorIdx = -1;
let blocoAnteriorProgresso = 0;
let blocoAnteriorPaused = false;
let hlsInstance = null;
let sistemaIniciado = false;

ytplayer.style.display = 'none';
video.style.display = 'block';

// --- LÓGICA DO BANNER AUTOMÁTICO ---
function gerenciarBannerKBS() {
  const b = blocos[idxBloco];
  const banner = document.getElementById('letreiro-kbs-auto');
  const logoImg = document.getElementById('letreiro-logo-img');
  
  if (b && b.arquivos && b.arquivos[b.arquivoAtual]) {
    let nomeLimpo = b.arquivos[b.arquivoAtual].file.name.replace(/\.[^/.]+$/, "").replace(/convertido/gi, "").replace(/^[\d.\s-]+/, "").trim();
document.getElementById('letreiro-texto-arquivo').innerText = "EXIBINDO: " + nomeLimpo;
    
    const urlLogo = document.getElementById('logoUrl').value;
    if (urlLogo) { logoImg.src = urlLogo; logoImg.style.display = 'block'; }

    banner.style.display = 'flex';
    setTimeout(() => { banner.style.display = 'none'; }, 20000); 
  }
}
setInterval(gerenciarBannerKBS, 180000); // 3 minutos

function fmt(s){ s=Math.max(0,Math.floor(s||0));
  const h=String(Math.floor(s/3600)).padStart(2,'0');
  const m=String(Math.floor((s%3600)/60)).padStart(2,'0');
  const ss=String(s%60).padStart(2,'0');
  return `${h}:${m}:${ss}`;
}
function timeToSec(str){ if(!str) return 0;
  const p=str.split(':').map(Number); 
  if(p.length === 3) return p[0]*3600 + p[1]*60 + p[2];
  return (p[0]||0)*3600+(p[1]||0)*60;
}
function anyPlayableBlocks(){ return blocos.some(b=>b && !b.removido); }

function adicionarBloco(tipo){
  if (tipo === 'youtube') return alert('Blocos YouTube / M3U são gerenciados apenas pelo painel Admin.');
  const bloco = {
    tipo, arquivos: [], progresso: [],
    tempo: (tipo==='timer'||tipo==='pause'?300:0),
    sessaoRestante: 0, pauseRestante: 0,
    arquivoAtual: 0, limitePorCiclo: (tipo==='movie'?3:0),
    ytlink:'', m3ulink:'', diaSemana:'', horaInicio:'', horaFim:'',
    removido:false, _agendadoRodando:false
  };
  const i = blocos.push(bloco)-1;
  renderizarBloco(i, bloco);
  atualizarGrade();
}

function renderizarBloco(i, bloco){
  const card = document.createElement('div');
  card.className='bloco'; card.id=`bloco-${i}`;
  const isTimer = bloco.tipo === 'timer';
  const isYoutubeM3U = bloco.tipo === 'youtube';

  card.innerHTML = `
    <h3>Bloco ${i+1} <span class="badge">${bloco.tipo==='timer'?'Tempo Fixo':bloco.tipo==='movie'?'Filmes':bloco.tipo==='pause'?'Pausa':'YouTube / M3U'}</span></h3>
    <div class="row">
      ${(isTimer||bloco.tipo==='movie') ? `
        <label>Pasta:</label>
        <input type="file" webkitdirectory directory multiple onchange="carregarArquivos(${i}, this.files)">
      `:''}
      
      ${isTimer ? `
        <label>Tempo:</label><input type="time" step="1" value="${fmt(bloco.tempo||300)}" oninput="definirTempo(${i}, this.value)">
        <label>Dia:</label><select onchange="definirDia(${i}, this.value)">
          <option value="">Sempre</option>
          <option ${bloco.diaSemana==="segunda"?"selected":""} value="segunda">Segunda</option>
          <option ${bloco.diaSemana==="terca"?"selected":""} value="terca">Terça</option>
          <option ${bloco.diaSemana==="quarta"?"selected":""} value="quarta">Quarta</option>
          <option ${bloco.diaSemana==="quinta"?"selected":""} value="quinta">Quinta</option>
          <option ${bloco.diaSemana==="sexta"?"selected":""} value="sexta">Sexta</option>
          <option ${bloco.diaSemana==="sabado"?"selected":""} value="sabado">Sábado</option>
          <option ${bloco.diaSemana==="domingo"?"selected":""} value="domingo">Domingo</option>
        </select>
        <label>Início:</label><input type="time" step="1" value="${bloco.horaInicio||''}" oninput="definirHoraInicio(${i}, this.value)">
        <label>Fim:</label><input type="time" step="1" value="${bloco.horaFim||''}" oninput="definirHoraFim(${i}, this.value)">
      `:''}

      ${bloco.tipo==='pause' ? `<label>Tempo:</label><input type="time" step="1" value="${fmt(bloco.tempo||300)}" oninput="definirTempo(${i}, this.value)">`:''}
      
      ${bloco.tipo==='movie' ? `
        <label>Limite:</label><input type="number" min="1" value="${bloco.limitePorCiclo||3}" onchange="definirLimite(${i}, this.value)">
        <div style="margin-top:8px; width:100%;">
          <button class="mini-btn" onclick="voltarArquivo(${i})">⏮ Voltar vídeo</button>
          <button class="mini-btn" onclick="pularArquivo(${i})">⏭ Pular vídeo</button>
        </div>
      `:''}

      ${isYoutubeM3U ? `
        <label>Início:</label><input type="time" step="1" value="${bloco.horaInicio||''}" disabled>
        <label>Fim:</label><input type="time" step="1" value="${bloco.horaFim||''}" disabled>
      `:''}
    </div>
    <div class="hint" id="info-${i}">${isYoutubeM3U?'Agendamento Admin':bloco.arquivos.length+' arquivos.'}</div>
    <button onclick="removerBloco(${i})" style="margin-top:8px;background:#b71c1c; width:100%;">🗑 Remover</button>
  `;
  blocosEl.appendChild(card);
}

setInterval(()=>{ verificarAgendados(); }, 1000);

function verificarAgendados(){
  if (blocos.length===0) return;
  const agora = new Date();
  const dias = ["domingo","segunda","terca","quarta","quinta","sexta","sabado"];
  const hoje = dias[agora.getDay()];
  const horaLonga = `${String(agora.getHours()).padStart(2,'0')}:${String(agora.getMinutes()).padStart(2,'0')}:${String(agora.getSeconds()).padStart(2,'0')}`;

  let blocoEncontrado = false;
  for (let i=0; i<blocos.length; i++){
    const b = blocos[i];
    if (!b || b.removido || (b.tipo !== 'youtube' && b.tipo !== 'timer')) continue;
    if (!b.horaInicio || !b.horaFim) continue;
    const diaMatch = (b.diaSemana === "" || b.diaSemana.toLowerCase() === hoje);
    const dentroDoHorario = (horaLonga >= b.horaInicio && horaLonga < b.horaFim);

    if (diaMatch && dentroDoHorario) {
      blocoEncontrado = true;
      if (!b._agendadoRodando) {
        if (sistemaIniciado && idxBloco !== i && !blocos[idxBloco]._agendadoRodando) {
          blocoAnteriorIdx = idxBloco;
          blocoAnteriorProgresso = video.currentTime;
          blocoAnteriorPaused = video.paused;
        }
        blocos.forEach(bl => bl._agendadoRodando = false);
        b._agendadoRodando = true;
        idxBloco = i;
        sistemaIniciado = true;
        tocarAtual();
      }
      break; 
    }
  }

  if (!blocoEncontrado) {
    const agendadoAnterior = blocos.find(b => b._agendadoRodando);
    if (agendadoAnterior) {
      agendadoAnterior._agendadoRodando = false;
      if (blocoAnteriorIdx !== -1) {
        idxBloco = blocoAnteriorIdx; blocoAnteriorIdx = -1;
        tocarAtual();
        setTimeout(() => { video.currentTime = blocoAnteriorProgresso; if(blocoAnteriorPaused) video.pause(); }, 500);
      } else proximoBloco();
    }
  }
}

function tocarAtual() {
  document.querySelectorAll('.bloco').forEach(el => el.classList.remove('running'));
  clearTimeout(pauseTimer);
  detachTimers();
  stopM3U();
  stopYouTube();

  if (!anyPlayableBlocks()) return;

  const b = blocos[idxBloco];
  if (!b || b.removido) {
    proximoBloco();
    return;
  }

  const agora = new Date();
  const dias = ["domingo", "segunda", "terca", "quarta", "quinta", "sexta", "sabado"];
  const hoje = dias[agora.getDay()];
  const horaLonga = `${String(agora.getHours()).padStart(2, '0')}:${String(agora.getMinutes()).padStart(2, '0')}:${String(agora.getSeconds()).padStart(2, '0')}`;

  const temHorario = (b.horaInicio && b.horaFim);
  const diaMatch = (b.diaSemana === "" || b.diaSemana.toLowerCase() === hoje);
  const dentroDoHorario = (horaLonga >= b.horaInicio && horaLonga < b.horaFim);

  if (b.tipo === 'youtube' && !temHorario) {
    pularParaProximo();
    return;
  }

  if (temHorario && (!diaMatch || !dentroDoHorario)) {
    pularParaProximo();
    return;
  }

  const card = document.getElementById(`bloco-${idxBloco}`);
  if (card) card.classList.add('running');
  ytplayer.style.display = 'none';
  video.style.display = 'block';

  if (b.tipo === 'pause') {
    video.pause();
    pauseTimer = setTimeout(() => proximoBloco(), b.tempo * 1000);
    return;
  }

  if (b.tipo === 'youtube') {
    if (b.ytlink) startYouTubeNow(b);
    else if (b.m3ulink) startM3UNow(b);
    return;
  }

  if (b.arquivos.length === 0) {
    proximoBloco();
    return;
  }

  video.src = b.arquivos[b.arquivoAtual].url;
  video.currentTime = b.progresso[b.arquivoAtual] || 0;
  video.play().catch(() => {});
  attachHandlersFor(b);
}

function pularParaProximo() {
  if (idxBloco + 1 < blocos.length) {
    idxBloco++;
    tocarAtual();
  } else {
    idxBloco = 0;
    setTimeout(() => tocarAtual(), 1000);
  }
}

function attachHandlersFor(b){
  detachTimers();
  if (b.tipo === 'timer' && (!b.horaInicio || !b.horaFim)) {
    let start = video.currentTime;
    timeupdateHandler = () => { if (video.currentTime - start >= b.tempo) { proximoArquivoMesmoBloco(); } };
    video.addEventListener('timeupdate', timeupdateHandler);
  }
  video.onended = () => {
    b.arquivoAtual = (b.arquivoAtual + 1) % b.arquivos.length;
    if (b.tipo === 'movie') { b._count = (b._count || 0) + 1; if (b._count >= b.limitePorCiclo) { b._count = 0; proximoBloco(); return; } }
    tocarAtual();
  };
}

function carregarArquivos(i, fileList){
  const validExtensions = ['.mp4', '.webm', '.ogg', '.mkv', '.mov'];
  const files = Array.from(fileList).filter(f => validExtensions.some(ext => f.name.toLowerCase().endsWith(ext)));
  blocos[i].arquivos = files.map(f => ({ url: URL.createObjectURL(f), file: f }));
  blocos[i].progresso = blocos[i].arquivos.map(()=>0);
  document.getElementById(`info-${i}`).textContent = files.length + " arquivos.";
  atualizarGrade();
}
function definirTempo(i,v){ blocos[i].tempo=timeToSec(v); atualizarGrade(); }
function definirLimite(i,v){ blocos[i].limitePorCiclo=parseInt(v); atualizarGrade(); }
function definirDia(i,v){ blocos[i].diaSemana=v; atualizarGrade(); }
function definirHoraInicio(i,v){ blocos[i].horaInicio=v; atualizarGrade(); }
function definirHoraFim(i,v){ blocos[i].horaFim=v; atualizarGrade(); }
function pularArquivo(i){ const b=blocos[i]; if(b.arquivos.length>0){ b.arquivoAtual=(b.arquivoAtual+1)%b.arquivos.length; if(idxBloco===i) tocarAtual(); } }
function voltarArquivo(i){ const b=blocos[i]; if(b.arquivos.length>0){ b.arquivoAtual=(b.arquivoAtual-1+b.arquivos.length)%b.arquivos.length; if(idxBloco===i) tocarAtual(); } }
function removerBloco(i){ blocos[i].removido=true; document.getElementById(`bloco-${i}`).remove(); proximoBloco(); }
function iniciar(){ sistemaIniciado = true; idxBloco=0; tocarAtual(); gerenciarBannerKBS(); }
function proximoBloco(){ idxBloco=(idxBloco+1)%blocos.length; tocarAtual(); }
function pausar(){ video.pause(); }
function retomar(){ video.play(); }
function startYouTubeNow(b){ ytplayer.style.display='block'; video.style.display='none'; const id = b.ytlink.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/))([A-Za-z0-9_-]{11})/); if(id) ytplayer.src=`https://www.youtube.com/embed/${id[1]}?autoplay=1`; }
function stopYouTube(){ ytplayer.src=''; ytplayer.style.display='none'; }
function startM3UNow(b){ video.style.display='block'; if(Hls.isSupported()){ hlsInstance=new Hls(); hlsInstance.loadSource(b.m3ulink); hlsInstance.attachMedia(video); hlsInstance.on(Hls.Events.MANIFEST_PARSED, ()=>video.play()); } }
function stopM3U(){ if(hlsInstance){ hlsInstance.destroy(); hlsInstance=null; } video.pause(); }
function detachTimers(){ if(timeupdateHandler) video.removeEventListener('timeupdate', timeupdateHandler); video.onended=null; }
function proximoArquivoMesmoBloco(){ const b=blocos[idxBloco]; b.arquivoAtual=(b.arquivoAtual+1)%b.arquivos.length; tocarAtual(); }
function resizePlayer(){ const w=document.getElementById('playerWidth').value, h=document.getElementById('playerHeight').value; video.style.width=w+'px'; video.style.height=h+'px'; ytplayer.style.width=w+'px'; ytplayer.style.height=h+'px'; }
function salvarProgramacao(){ const blob=new Blob([JSON.stringify(blocos)],{type:"application/json"}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="programacao.json"; a.click(); }
function carregarProgramacao(input){ const reader=new FileReader(); reader.onload=e=>{ blocos=JSON.parse(e.target.result); blocosEl.innerHTML=""; blocos.forEach((b,i)=>renderizarBloco(i,b)); atualizarGrade(); }; reader.readAsText(input.files[0]); }
function blocoAnterior(){ idxBloco=(idxBloco-1+blocos.length)%blocos.length; tocarAtual(); }
function atualizarGrade(){ gradeEl.textContent = blocos.filter(b=>!b.removido).map((b,i)=>`Bloco ${i+1}: ${b.tipo} ${b.horaInicio?'('+b.horaInicio+')':''}`).join('\n'); }

// --- NOVA LÓGICA DE ARRASTAR O BANNER (DRAG AND DROP) ---
let isDragging = false;
let offsetX, offsetY;
const bannerEl = document.getElementById('letreiro-kbs-auto');

window.startDrag = function(e) {
  isDragging = true;
  offsetX = e.clientX - bannerEl.getBoundingClientRect().left;
  offsetY = e.clientY - bannerEl.getBoundingClientRect().top;
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', stopDrag);
};

function onDrag(e) {
  if (!isDragging) return;
  const container = bannerEl.parentElement.getBoundingClientRect();
  let x = e.clientX - container.left - offsetX;
  let y = e.clientY - container.top - offsetY;
  bannerEl.style.left = x + 'px';
  bannerEl.style.top = y + 'px';
}

function stopDrag() {
  isDragging = false;
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', stopDrag);
}
</script>
